<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Mon Voyage Volontariat</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      scroll-behavior: smooth;
      background: #1f2d2b;
      color: white;
    }

    section {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      padding: 40px;
      text-align: center;
    }

    h1 {
      font-size: 3em;
      margin-bottom: 20px;
    }

    p, li {
      font-size: 1.5em;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    .slide {
      opacity: 0;
      transform: translateY(50px);
      transition: all 0.8s ease;
    }

    .slide.visible {
      opacity: 1;
      transform: translateY(0);
    }

    nav {
      position: fixed;
      top: 10px;
      right: 20px;
    }

    nav a {
      color: white;
      margin-left: 15px;
      text-decoration: none;
    }
  </style>
</head>

<body>

<nav>
  <a href="#intro">Intro</a>
  <a href="#type">Type</a>
  <a href="#pays">Pays</a>
  <a href="#hotes">Hôtes</a>
  <a href="#raison">Pourquoi</a>
</nav>

<section id="intro" class="slide">
  <h1>Mon Voyage 🌍</h1>
  <p>Volontariat</p>
</section>

<section id="type" class="slide">
  <h1>Type</h1>
  <ul>
    <li>Écologie</li>
    <li>Animaux</li>
    <li>Communauté</li>
  </ul>
</section>

<section id="pays" class="slide">
  <h1>Pays</h1>
  <ul>
    <li>Espagne 🇪🇸</li>
    <li>Culture</li>
    <li>Climat</li>
  </ul>
</section>

<section id="hotes" class="slide">
  <h1>Hôtes</h1>
  <ul>
    <li>Ferme bio 🌱</li>
    <li>Auberge 🏡</li>
  </ul>
</section>

<section id="raison" class="slide">
  <h1>Pourquoi ?</h1>
  <ul>
    <li>Apprendre</li>
    <li>Voyager</li>
    <li>Nouvelles compétences</li>
  </ul>
</section>

<script>
  const slides = document.querySelectorAll('.slide');

  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  });

  slides.forEach(slide => {
    observer.observe(slide);
  });
</script>

</body>
</html>
